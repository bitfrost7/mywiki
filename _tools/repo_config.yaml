# mywiki CodeNotes Pipeline 配置
# 外部配置驱动，定义系统和 repo 列表，替换 fetch_code_notes.py 中的硬编码 SYSTEMS dict
# 位置: _tools/repo_config.yaml — 与 pipeline 脚本同目录
#
# 变更指引:
#   - 新增系统: 在 systems 下加一个条目，列出所有 repo URL
#   - 新增 repo: 在对应系统的 repos 下加一行，自动纳入下次 pipeline 扫描
#   - 移除 repo: 直接删除对应行，下次 pipeline 不会清理旧文件，但不再更新
#   - 修改分析配置: 修改 system 或 repo 级别的 analyzer 字段

version: 1

# 默认分析配置（可被 system/repo 级别覆盖）
defaults:
  analyzer:
    languages: [go]               # 分析的语言
    max_file_size_kb: 512          # 跳过过大的文件
    exclude_patterns:              # 排除模式
      - vendor/
      - third_party/
      - generated/
      - "*.pb.go"
      - "*.pb.gw.go"
      - "*.mock.go"
    config_extensions:             # 视为配置文件的扩展名
      - .yaml
      - .yml
      - .toml
      - .json
      - .env

