    <script>
      window.$docsify = {
        routerMode: 'history',
        loadSidebar: true,
        homepage: 'home.md',
        basePath: '/',
        notFoundPage: '404.md',
        noEmoji: true,
        auto2top: true,
        topMargin: 120,
        executeScript: true,
        formatUpdated: function (time) {
          const dd = new Date(time)
          time =
            '<p class="upTime">最近更新时间：' +
            '<span>' +
            dd.getFullYear() +
            '-' +
            appendZero(dd.getMonth() + 1) +
            '-' +
            appendZero(dd.getDate()) +
            ' ' +
            appendZero(dd.getHours()) +
            ':' +
            appendZero(dd.getMinutes()) +
            ':' +
            appendZero(dd.getSeconds()) +
            '</span></p>'
          return time

          function appendZero(obj) {
            if (obj < 10) return '0' + obj
            else return obj
          }
        },
        requestHeaders: {
          'cache-control': 'no-cache',
        },
        alias: {
          '/(api|usdpdc|usdp_community|UCloudStack|UCloudStack_v2.x|UCloudStor)/(.*\/)(.*\/)(.*\/)_sidebar.md':
            '/$1/$2_sidebar.md',
          '/(api|usdpdc|usdp_community|UCloudStack|UCloudStack_v2.x|UCloudStor)/(.*\/)(.*\/)_sidebar.md':
            '/$1/$2_sidebar.md',
          '/(api|usdpdc|usdp_community|UCloudStack|UCloudStack_v2.x|UCloudStor)/(.*\/)_sidebar.md': '/$1/$2_sidebar.md',
          '/(.*\/)(.*\/)(.*\/)(.*\/)_sidebar.md': '$1_sidebar.md',
          '/(.*\/)(.*\/)(.*\/)_sidebar.md': '$1_sidebar.md',
          '/(.*\/)(.*\/)_sidebar.md': '$1_sidebar.md',
          '/(.*\/)_sidebar.md': '$1_sidebar.md',
          '/(.*).html': '$1',
        },
        copyCode: {
          buttonText: 'Copy',
          errorText: 'Error',
          successText: 'Success',
        },
        pagination: {
          previousText: 'PREVIOUS',
          nextText: 'NEXT',
          crossChapter: true,
        },
      }
    </script>
